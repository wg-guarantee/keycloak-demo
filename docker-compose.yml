# ============================================================
# docker-compose.yml  –  Keycloak Demo: 一键启动所有服务
# ============================================================
# 用法：
#   cp .env.example .env   # 填写腾讯云 SMS 和 Session 密钥
#   docker compose up -d   # 启动 PostgreSQL + Keycloak + FastAPI
#
# 单独启动 Keycloak（不含 App）：
#   docker compose up -d postgres keycloak
#
# 单独启动 App（需要 Keycloak 已运行）：
#   docker compose up -d app
# ============================================================

name: keycloak-demo

services:

  # ══════════════════════════════════════════════════════════
  # 基础设施：PostgreSQL + Keycloak
  # ══════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  keycloak:
    # 先构建包含腾讯云 SMS SPI 的自定义镜像，再启动
    # 构建前需要运行：cd keycloak-spi && mvn clean package -DskipTests
    build:
      context: ./keycloak-spi
      dockerfile: Dockerfile
    restart: unless-stopped
    command: start-dev
    environment:
      # ── 数据库 ─────────────────────────────────────────────
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}

      # ── 管理员账号（首次启动初始化，之后可删除此变量）────────
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      # ── 对外访问地址（浏览器和 Token Issuer 使用此地址）──────
      # KC_HOSTNAME 决定 JWT 中 iss 字段的值，必须是浏览器可访问的完整 URL
      KC_HOSTNAME: http://${KEYCLOAK_HOST:-43.161.250.138}:${KEYCLOAK_PORT:-8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      # ── 腾讯云 SMS（Mock 模式：OTP 打印到日志，无需填写真实凭据）──────
      # 查看验证码：docker compose logs keycloak | grep "[SMS-MOCK]"
      # 如需接入真实 SMS，在 TencentSmsService.java 中替换实现并开启以下变量：
      # TENCENT_SMS_SECRET_ID: ${TENCENT_SMS_SECRET_ID}
      # TENCENT_SMS_SECRET_KEY: ${TENCENT_SMS_SECRET_KEY}
      # TENCENT_SMS_APP_ID: ${TENCENT_SMS_APP_ID}
      # TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME}
      # TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID}
      # TENCENT_SMS_REGION: ${TENCENT_SMS_REGION:-ap-guangzhou}

      # ── 邮件发送 OTP（填写后 SMS Mock 同步发送邮件）──────────
      # 留空则只打印日志，不发邮件
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # TCP 探测 8080 端口；app 容器的 setup_realm.py 会自动重试直到 HTTP API 就绪
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # ══════════════════════════════════════════════════════════
  # 应用：FastAPI
  # ══════════════════════════════════════════════════════════

  app:
    build:
      context: .           # 根目录，使 Dockerfile 能访问 scripts/
      dockerfile: app/Dockerfile
    restart: unless-stopped
    environment:
      # Keycloak 对外地址（与 KC_HOSTNAME 保持一致，浏览器也能访问）
      KEYCLOAK_URL: http://${KEYCLOAK_HOST:-43.161.250.138}:${KEYCLOAK_PORT:-8080}
      # Realm 初始化脚本需要管理员密码（容器内部通过 http://keycloak:8080 访问）
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      REALM: ${REALM:-demo}
      CLIENT_ID: ${CLIENT_ID:-demo-app}
      CLIENT_SECRET: ""
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      SESSION_SECRET: ${SESSION_SECRET}
      # SMTP（邮箱激活 / 忘记密码）—— 留空则关闭邮件功能
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
    name: keycloak-demo-postgres-data
