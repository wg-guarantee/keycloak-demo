spring:
  application:
    name: keycloak-demo
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/webank}
    username: ${SPRING_DATASOURCE_USERNAME:webank}
    password: ${SPRING_DATASOURCE_PASSWORD:webank123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:spring-boot-app}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope: openid,profile,email
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:webank}
            authorization-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:webank}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:webank}/protocol/openid-connect/token
            user-info-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:webank}/protocol/openid-connect/userinfo
            jwk-set-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:webank}/protocol/openid-connect/certs
            user-name-attribute: preferred_username

server:
  port: ${APP_SERVER_PORT:8080}
  servlet:
    context-path: ${APP_CONTEXT_PATH:/api}

logging:
  level:
    root: INFO
    com.webank: DEBUG
    org.springframework.security: DEBUG

# Aliyun Configuration
aliyun:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
    region-id: cn-hangzhou
  
  email:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    from-address: ${ALIYUN_EMAIL_FROM:}
    from-alias: ${ALIYUN_EMAIL_FROM_ALIAS:Webank Demo}
    region-id: cn-hangzhou

# Application Configuration
app:
  verification-code:
    sms-expiry-minutes: 5
    email-expiry-hours: 24
    max-attempts: 3
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production}
    expiration-minutes: 60
